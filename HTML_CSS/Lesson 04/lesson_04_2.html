<!DOCTYPE html>
<body lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        
     .Back
     {
        padding-top: 5px;
        padding-bottom: 5px;
        margin-right: 7px;
    }

     .Next
     {
        padding-top: 5px;
        padding-bottom: 5px;
        margin-left: 7px;
        
     }

     .one{
        margin-right: 4px;
    }
     .two{
        margin-right: 4px;
    }
     .three{
        margin-right: 4px;
    }
     .Four{
        margin-right: 4px;
    }

    .Stretch
    {
        padding : 5px 10px 5px 10px;
        background-color: rgb(19, 103, 62);
        border-style: none;
        color:white;
        font-weight: bold;
        cursor:pointer;
        transition: padding 0.25s;
        
    }
    .Stretch:hover
    {
        padding: 20px 40px 20px 40px;
        
    }

    .Shadow
    {
        padding: 5px 20px 5px 20px;
        background-color: rgb(16, 122, 42);
        box-shadow: 5px 5px 4px rgba(0,0,0,0.25);
        color:white;
        font-weight: bold;
        transition: margin 0.25s;
        cursor:pointer;
        border-style: none;
    }


    .Shadow:active
    {
        margin:3px 3px 3px 3px;
        box-shadow: 5px 5px 2px rgb(255, 255, 255);
    }

    .ONE
    {
        padding:10px 14px;
        margin: 0px 5px;
        background-color: rgb(16, 122, 42);
        color:white;
        font-weight: bold;
        transition:margin 0.25s;
        transition: padding 0.25s;
    }

    .ONE:hover
    {
        
        padding: 10px 20px;
        margin: 0px 0px;
       

    }
    

    </style>

    <button class="Back">Back</button>

    <a href="https://chatgpt.com/" class="Four">4</a>

    <p>Make Stretch button</p>

    <p>Make Shadow button</p>
    <button class="Shadow">Shadow</button>
    <p>Make buttons with margin-padding</p>

    <button class="ONE">TWO</button>
     <button class="ONE">THREE</button>



</body>
</html>
