<!DOCTYPE html>

<!--
    HTML (Basic)

    <!DOCTYPE html>
    - It tells the browser that this is an HTML5 document.
    - It helps the browser render the page correctly.
    - It is not case-sensitive.
-->

<html lang="en">

<!--
    lang="en"
    - Specifies that the language of this HTML document is English.
-->

<head>
     <meta charset="UTF-8">
    <!--
        <meta> provides extra information (metadata) about the webpage.

        charset="UTF-8"
        - Uses the UTF-8 character encoding.
        - Supports Unicode characters from many languages.
    -->

    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
        viewport
        - Makes the webpage responsive.
        - width=device-width sets the page width equal to the device width.
        - initial-scale=1.0 sets the initial zoom level to 100%.
    -->

    <title>Document</title>
</head>
<body>
    <!--
        ======================
              HTML TAGS
        ======================

        1.Self-closing Tags:
        - <!DOCTYPE html>
        - <br>
        - <img>
        - <a>

        2.Pair Tags:
        - <html></html>
        - <span></span>

        3.Block Tags:
        - Block elements take up the full width of a line.
        - The next element starts on a new line.

        Example:
        <h1></h1>

        4.Inline Tags:
        <span></span> is an inline tag.
        It only takes up the space that its content needs.

        Example:
        <h1>Hello</h1>
        <h3>my</h3>
        <h2>World</h2>
        <span>!!</span>

        Hello -> Block Element
        my -> Block Element
        World -> Block Element
        !! -> Inline Element
    -->
    <h1><b>heading formats:</b></h1>

     <!--
        Heading Tags:
        Default heading tags range from <h1> to <h6>.
    -->
    
    <h1>trying heading 1</h1>
    <h2>trying heading 2</h2>
    <h3>trying heading 3</h3>
    <h4>trying heading 4</h4>
    <h5>trying heading 5</h5>

    <h1><b>paragraph formats:</b></h1>

    <!--
        Paragraph Tag:
        All paragraphs are defined using
        <p></p>.
    -->
    <p>this is a paragraph text.i can write what ever i want to in this tag.i love html.i am coding.i am happy</p>

    <h1><b>attachment formats:</b></h1>

    <!--
        Link Tag:
        Links are created using the <a> tag.

        Syntax:
        <a href="URL">Link Text</a>
    -->

    <a href ="https://www.w3schools.com/">click here to learn more </a>

    <h1><b>image formats</b></h1>
    <!--
        Image Tag:

        Syntax:
        <img src="" alt="" width="" height="">

        src    = Image source
        alt    = Alternative name/text
        width  = Image width
        height = Image height
    -->

    <img src="pakichud.webp" alt="picture" width="500" height="900">

</body>
</html>
