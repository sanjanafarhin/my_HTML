<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .Uber_button
        {
            background-color: black;
            color:rgb(246, 246, 246);
            height:36px;
            width:120px;
            border-style: none;
        }
        

         .Amazon_button
        {
            background-color: rgb(255,216, 20);
            color:rgb(0, 0, 0);
            height:36px;
            width:170px;
            border-style: none;
            border-radius: 18px;
        }

        .Github_button
        {
            background-color: rgb(46,164, 79);
            color:rgb(255, 255, 255);
            height:36px;
            width:100px;
            border-style: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .Bootstrap_Button_01
        {
            background-color: rgb(121,82, 179);
            color:rgb(255, 255, 255);
            height:36px;
            width:110px;
            border-style: none;
            border-radius: 3px;
            font-weight: bold;
        }

         .Bootstrap_Button_02
        {
            background-color: rgb(255, 255, 255);
            color:rgb(108,117, 125);
            height:36px;
            width:110px;
            border-color: rgb(108,117, 125);
            border-width: 1px;
            border-radius: 3px;
            font-weight: bold;
        }

        .Linkedin_Button_01
        {
            background-color: rgb(10, 102, 194);
            height:36px;
            width:200px;
            border-style: none;
            color:white;
            border-radius:18px ;
            font-weight: bolder;
        }


        .linkedin_Button_02
        {
            background-color:white;
            height:36px;
            width:72px;
            border-width: 2px;
            border-color:rgb(10, 102, 194) ;
            color:rgb(10, 102, 194);
            border-radius:18px ;
            font-weight:bold;
        }

        .amazon_button_01
        {
            background-color:rgb(255, 216, 20) ;
            height:30px;
            width:100px;
            border-style: none;
            border-radius: 20px;
            font-weight:300;
            margin-right: 6px;
        }

         .amazon_button_02
        {
            background-color:rgb(255, 164, 28) ;
            height:30px;
            width:120px;
            border-style: none;
            border-radius: 20px;
            font-weight:300;
        }

        .Title
        {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: bold;
            font-size: large;
            color: black;

        }

        .price
        {
            font-family: Georgia, 'Times New Roman', Times, serif; 
            color:rgb(0, 118, 0);
            font-weight: bold;
            font-size:small;
            
        }

        .delivery
        {
            font-family:'Times New Roman', Times, serif;
            font-weight: 200;
        }


    </style>

    <p style="color:brown">Uber "request" button:</p>
    <button class="Uber_button">Request now</button>

    <p style="color:brown">Amazon "Add to cart" :</p>
    <button class="Amazon_button">Add to cart</button>

    <p style="color:brown">Github "Sign up":</p>
    <button class="Github_button">Sign up</button>

    <p style="color:brown">Bootstrap "Get started" & "download":</p>
    <button class="Bootstrap_Button_01">Get started</button>
    <button class="Bootstrap_Button_02">Download</button>

    <p style="color:brown">Linkedin "Apply on company website" & "save":</p>
    <button class="Linkedin_Button_01">Apply on company website</button>
    <button class="linkedin_Button_02">save</button>

    <p style="color:brown">whole amazon page</p>

    <a href="https://www.amazon.com/" style="color:rgb(0, 113, 133)">Back to Amazon</a>
    <p class="Title">Nike Black Running Shoes</p>
    <p class="price">$39- in Stock.</p>
    <p class="delivery"> Free delivery tomorrow.</p>
    <button class="amazon_button_01">Add to cart</button>
    <button class="amazon_button_02">Buy now</button>
</body>
</html>
